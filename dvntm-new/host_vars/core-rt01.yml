---
# VyOS Router - Core router for isolated network segment
#
# eth0 (WAN): BC:24:11:2E:26:4E - DHCP from upstream
# eth1 (LAN): BC:24:11:D7:85:C2 - 10.20.99.2

infrastructure:
  form: vm
  interfaces:
    eth0:
      mac: "bc:24:11:2e:26:4e"
    eth1:
      mac: "bc:24:11:d7:85:c2"

env:
  role: core
  interfaces:
    eth0:
      ip: dhcp
      purpose: wan
    eth1:
      ip: 10.20.99.2
      purpose: lan
      segment: management
      dns:
        host_a_record: true
        dhcp_reservation: false
        cnames:
          - gateway
          - dns
          - dhcp

# Ansible connection - use LAN IP once configured
ansible_host: 10.20.99.2

# --- DNS Configuration ---
dns_domain: "core-rt01.deevnet.net"
dns_listen_address: "10.20.99.2"
dns_allow_from:
  - "10.20.99.0/24"

# --- DHCP Configuration ---
dhcp_domain: "core-rt01.deevnet.net"
dhcp_subnets:
  - name: management
    subnet: "10.20.99.0/24"
    gateway: "10.20.99.2"
    range_start: "10.20.99.100"
    range_end: "10.20.99.200"

dhcp_dns_servers:
  - "10.20.99.2"

# --- Firewall Configuration ---
firewall_zones:
  - name: WAN
    description: "Upstream network (DHCP)"
    default_action: drop
    interfaces:
      - eth0
  - name: LAN
    description: "Trusted LAN network"
    default_action: accept
    interfaces:
      - eth1

firewall_zone_policies:
  - from_zone: LAN
    to_zone: WAN
    action: accept

firewall_enable_nat: true
firewall_nat_outbound_interface: "eth0"
