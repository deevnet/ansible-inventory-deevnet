infrastructure:
  form: sw
  interfaces:
    eth0:
      mac: "5c:62:8b:0c:40:ec"

env:
  interfaces:
    eth0:
      ip: 192.168.10.10
      purpose: mgmt
      segment: management
      dns:
        host_a_record: true
        dhcp_reservation: true
        cnames: []

# Switch port definitions for switch_vlans role
# Port naming follows TP-Link Omada CLI convention (Cisco-style)
# Update interface names after confirming via: show interfaces status
switch_ports:
  trunk:
    - interface: "gigabitEthernet 1/0/1"
      description: "uplink to core-rt02"
      native_vlan: 999
      # allowed_vlans defaults to all VLANs from deevnet_vlans
    - interface: "gigabitEthernet 1/0/4"
      description: "ap01 wifi trunk"
      native_vlan: 99
      allowed_vlans: [10, 30, 31, 40, 99]
  access:
    # Management segment
    - interface: "gigabitEthernet 1/0/15"
      vlan_id: 99
      description: "hv01 mgmt"
    - interface: "gigabitEthernet 1/0/16"
      vlan_id: 99
      description: "provisioner-ph01 mgmt"
    # IoT segment
    - interface: "gigabitEthernet 1/0/3"
      vlan_id: 30
      description: "pi02 iot"
    - interface: "gigabitEthernet 1/0/14"
      vlan_id: 30
      description: "pi01 iot"
