# VLAN segment definitions for dvnt substrate
# Addressing convention: 10.10.{vlan_id}.0/24
deevnet_vlans:
  trusted:
    vlan_id: 10
    subnet: "10.10.10.0/24"
    gateway: "10.10.10.1"
    dhcp_range_start: "10.10.10.100"
    dhcp_range_end: "10.10.10.200"
    wifi_ssid: "DVNT"
  storage:
    vlan_id: 20
    subnet: "10.10.20.0/24"
    gateway: "10.10.20.1"
    dhcp_enabled: false  # Static mappings only
  platform:
    vlan_id: 25
    subnet: "10.10.25.0/24"
    gateway: "10.10.25.1"
    dhcp_enabled: false  # Static mappings only
  iot:
    vlan_id: 30
    subnet: "10.10.30.0/24"
    gateway: "10.10.30.1"
    dhcp_range_start: "10.10.30.100"
    dhcp_range_end: "10.10.30.200"
    wifi_ssid: "DVNT-IOT"
  iot_vendor:
    vlan_id: 31
    subnet: "10.10.31.0/24"
    gateway: "10.10.31.1"
    dhcp_range_start: "10.10.31.100"
    dhcp_range_end: "10.10.31.200"
    wifi_ssid: "DVNT-IOTV"
  iot_backend:
    vlan_id: 35
    subnet: "10.10.35.0/24"
    gateway: "10.10.35.1"
    dhcp_enabled: false  # Static mappings only
  guest:
    vlan_id: 40
    subnet: "10.10.40.0/24"
    gateway: "10.10.40.1"
    dhcp_range_start: "10.10.40.50"
    dhcp_range_end: "10.10.40.250"
    wifi_ssid: "DVNT-GUEST"
  tenant_1:
    vlan_id: 50
    subnet: "10.10.50.0/24"
    gateway: "10.10.50.1"
  tenant_2:
    vlan_id: 51
    subnet: "10.10.51.0/24"
    gateway: "10.10.51.1"
  tenant_3:
    vlan_id: 52
    subnet: "10.10.52.0/24"
    gateway: "10.10.52.1"
  management:
    vlan_id: 99
    subnet: "10.10.99.0/24"
    gateway: "10.10.99.1"
    dhcp_enabled: false  # Static mappings only for infrastructure
  blackhole:
    vlan_id: 999
    dhcp_enabled: false
