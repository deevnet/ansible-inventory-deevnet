  # Optional customizations
  omada_image_tag: "6.1"
  omada_env_vars:
    - "TZ=America/New_York"
    - "MANAGE_HTTP_PORT=8088"
    - "MANAGE_HTTPS_PORT=8043"
    - "PORTAL_HTTP_PORT=8088"
    - "PORTAL_HTTPS_PORT=8843"
    - "SHOW_SERVER_LOGS=true"
    - "SHOW_MONGODB_LOGS=false"

  # Omada controller API credentials (references vault)
  omada_admin_user: "{{ vault_omada_admin_user }}"
  omada_admin_password: "{{ vault_omada_admin_password }}"
